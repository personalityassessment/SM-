<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>あなたのSMタイプは？</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="16タイプでわかるあなたのSM気質">
  <meta property="og:title" content="あなたのSMタイプは？">
  <meta property="og:description" content="16タイプでわかるあなたのSM気質">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>あなたのSMタイプは？</h1>
    <p>― 16タイプでわかるあなたのSM気質 ―</p>

    <div id="startScreen" class="section-card">
      <p class="result-sm-comment" style="margin-top:0;">
        あなたは支配者？それとも受容者？隠れたSM本性を暴きます。
      </p>
      <div class="share-row">
        <button class="share-btn" onclick="startDiagnosis()">診断をはじめる</button>
      </div>
    </div>

    <div class="section-card" id="aboutScreen">
      <h2 style="margin-top:0;">この診断について</h2>
      <p>
        この診断は、F/I・R/C・O/A・T/P の4軸から、
        あなたの思考傾向・行動傾向・支配関係・刺激耐性を分析します。
      </p>
      <p style="margin-bottom:0;">
        結果は「16タイプ」と「称号」の組み合わせで表示されます。
      </p>
    </div>

    <div id="questionScreen" style="display:none">
      <h2 id="questionText"></h2>

      <div id="answers">
        <button onclick="answer(1)">とてもそう思う</button>
        <button onclick="answer(2)">ややそう思う</button>
        <button onclick="answer(3)">どちらでもない</button>
        <button onclick="answer(4)">あまり思わない</button>
        <button onclick="answer(5)">全く思わない</button>
      </div>

      <div class="share-row" style="margin-top:16px;">
        <button class="retry-btn" onclick="goPrevQuestion()">戻る</button>
      </div>

      <p id="progress"></p>
    </div>

    <div id="resultScreen" style="display:none">
      <div id="resultCard"></div>
      <div id="compatibility"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
